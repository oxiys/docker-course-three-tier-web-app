name: CI build and push

on:
  push:
    branches: [ "main" ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessario per lo storico completo del Secret Scanning

      # =========================================================================
      # 1. SCANSIONE CODICE, DIPENDENZE E SECRET SCANNING (Prima della build)
      # =========================================================================
      
      - name: 🔐 Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          base: "" # Lasciare vuoto indica di non cercare un delta con altri branch
          head: ${{ github.ref_name }} # Forza la scansione dei commit del branch corrente (main)
          extra_args: --results=verified,unknown

      - name: 🛡️ Scansione Codice (SCA/SAST) e Dipendenze
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs' # Scansiona il file system (codice sorgente e package.json/lock)
          scan-ref: '.'
          format: 'table'
          exit-code: '1' # Blocca la pipeline se trova vulnerabilità gravi
          severity: 'CRITICAL,HIGH'

      # =========================================================================
      # 2. VALIDAZIONE MANIFEST KUBERNETES E CONFIGURAZIONI SICURE (Misconfigurations)
      # =========================================================================

      - name: ☸️ Validazione Manifest K8s e Blocco Configurazioni non sicure
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config' # Scansiona Dockerfile e Manifest Kubernetes (IaC)
          scan-ref: '.'
          format: 'table'
          exit-code: '1' # Blocca la pipeline in caso di misconfiguration (es. root user, privileged container)
          severity: 'CRITICAL,HIGH'

      # =========================================================================
      # 3. LOGIN E LOGICA DI BUILD LOCAL (Per scansione immagini)
      # =========================================================================

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build locale dell'API (senza push immediato)
      - name: Build API Local Image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          load: true # Carica l'immagine nel demone Docker locale invece di pushare
          tags: ${{ secrets.DOCKER_USERNAME }}/three-tier-api:${{ github.sha }}

      # Build locale del Frontend (senza push immediato)
      - name: Build APP (Frontend) Local Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          load: true # Carica l'immagine nel demone Docker locale
          tags: ${{ secrets.DOCKER_USERNAME }}/three-tier-frontend:${{ github.sha }}

      # =========================================================================
      # 4. SCANSIONE DELLE IMMAGINI CONTAINER (Prima del Push)
      # =========================================================================

      - name: 🐳 Scansione Immagine Container - API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/three-tier-api:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Blocca la pipeline se l'immagine ha vulnerabilità CRITICHE o ALTE
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 🐳 Scansione Immagine Container - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/three-tier-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # =========================================================================
      # 5. PUSH DELLE IMMAGINI SICURE
      # =========================================================================

      - name: 🚀 Push API Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/three-tier-api:latest
            ${{ secrets.DOCKER_USERNAME }}/three-tier-api:${{ github.sha }}

      - name: 🚀 Push APP (Frontend) Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/three-tier-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/three-tier-frontend:${{ github.sha }}
