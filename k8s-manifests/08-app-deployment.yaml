apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: three-tier-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # Sostituisci <IL_TUO_USERNAME_DOCKERHUB> con il tuo username (es. oxiys)
        image: oxiys/three-tier-frontend:latest 
        ports:
        - containerPort: 5002
