apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-app-sa
  namespace: three-tier-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: my-app-role
  namespace: three-tier-app
rules:
# 1. Permessi completi (lettura e scrittura) per le risorse standard
- apiGroups: ["", "apps"]
  resources: ["pods", "deployments", "configmaps", "secrets", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# 2. FIX KSV-0056: Permessi di sola lettura per i servizi
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: my-app-rolebinding
  namespace: three-tier-app
subjects:
- kind: ServiceAccount
  name: my-app-sa
  namespace: three-tier-app
roleRef:
  kind: Role
  name: my-app-role
  apiGroup: rbac.authorization.k8s.io
